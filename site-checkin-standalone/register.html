<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนใบหน้า</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#04262b">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Prompt', sans-serif;
      min-height: 100vh;
      background: #f9fafb;
      color: #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px 60px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      animation: fadeIn 0.5s ease;
    }

    /* Header */
    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: #4b5563; text-decoration: none; font-size: 0.9em; font-weight: 600;
      padding: 8px 16px; border-radius: 50px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.02);
      transition: all 0.25s ease;
      margin-bottom: 16px;
    }
    .back-btn:hover { color: #0b3d1b; background: #f3f4f6; border-color: #d1d5db; transform: translateY(-1px); }

    h2 {
      font-size: 1.5em; font-weight: 700;
      color: #0b3d1b;
      margin-bottom: 6px;
    }
    .instruction {
      font-size: 0.85em; color: #6b7280; line-height: 1.6; font-weight: 400;
    }

    /* Step dots */
    .step-dots {
      display: flex; justify-content: center; gap: 10px;
      margin: 16px 0 20px;
    }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #e5e7eb;
      transition: all 0.3s ease;
    }
    .dot.active {
      background: #0b3d1b;
      box-shadow: 0 0 10px rgba(11, 61, 27, 0.4);
    }

    /* Status */
    #status {
      font-size: 0.9em; color: #6b7280; font-weight: 600;
      margin-bottom: 14px; min-height: 20px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 3px solid #e5e7eb;
      border-top-color: #0b3d1b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Video */
    .video-wrapper {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 4px solid #ffffff;
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.08);
      background: #000000;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }
    video {
      width: 100%; display: block;
      transform: scaleX(-1);
      border-radius: 16px;
    }

    /* Form Section */
    .form-section {
      margin-top: 24px;
      background: #ffffff;
      border: 1px solid #f3f4f6;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04);
    }
    .name-section {
      margin-top: 0;
      margin-bottom: 16px;
      padding: 18px;
    }
    .name-section .input-group { margin-bottom: 0; }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      color: #1f2937;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Prompt', sans-serif;
      outline: none;
      transition: all 0.3s ease;
    }
    .input-group input::placeholder { color: #9ca3af; font-weight: 400; }
    .input-group input:focus {
      border-color: #0b3d1b;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(11, 61, 27, 0.1);
    }

    #btnSave {
      width: 100%;
      padding: 16px;
      background: #0b3d1b;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Prompt', sans-serif;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(11, 61, 27, 0.15);
    }
    #btnSave:hover:not(:disabled) {
      background: #166534;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(22, 101, 52, 0.25);
    }
    #btnSave:disabled {
      background: #e5e7eb;
      color: #9ca3af;
      box-shadow: none;
      cursor: not-allowed;
    }

    .count-badge {
      background: rgba(255,255,255,0.25);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 13px;
    }
    #btnSave:disabled .count-badge { background: #d1d5db; color: #ffffff; }

    #msg {
      margin-top: 16px; min-height: 24px;
      font-size: 0.9em; font-weight: 600;
      text-align: center;
    }
    .msg-success { color: #059669; }
    .msg-error   { color: #dc2626; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin   { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <a href="index.html" class="back-btn">← กลับหน้าหลัก</a>
    <h2>👤 ลงทะเบียนใบหน้า</h2>
    <p class="instruction">กดเริ่มเพียงครั้งเดียว แล้วค่อย ๆ หันหน้าไปด้านหนึ่งและหมุนกลับไปอีกด้าน<br>ระบบจะเก็บใบหน้าให้อัตโนมัติ</p>
  </div>

  <div class="form-section name-section">
    <div class="input-group">
      <input type="text" id="username" placeholder="ชื่อ-นามสกุลพนักงาน">
    </div>
  </div>

  <div class="step-dots">
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
  </div>

  <div id="status">
    <span class="spinner"></span> กำลังโหลด AI Model...
  </div>

  <div class="video-wrapper">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="form-section">
    <button id="btnSave" onclick="startAutoCapture()" disabled>
      🎥 เริ่มสแกนใบหน้า
    </button>

    <div id="msg"></div>
  </div>
</div>

<script>
  const API_URL   = localStorage.getItem('gasApiUrl') || GAS_API_URL;
  const APP_KEY   = localStorage.getItem('appKey') || '';
  const video     = document.getElementById('video');
  const statusDiv = document.getElementById('status');
  const btnSave   = document.getElementById('btnSave');
  const msgDiv    = document.getElementById('msg');
  let saveCounter = 0;
  let isCapturing = false;
  let knownFaces  = [];   // ใบหน้าที่ลงทะเบียนแล้ว — ใช้เช็กว่าหน้าใหม่คล้ายคนอื่นเกินไปหรือไม่

  // ระยะห่างขั้นต่ำจากใบหน้า "คนอื่น" — ถ้าใกล้กว่านี้ เสี่ยงสแกนแล้วชื่อสลับกัน
  const DUPLICATE_DISTANCE = 0.42;

  if (!API_URL) {
    statusDiv.innerHTML = '<span style="color:#dc2626">❌ ยังไม่ได้ตั้งค่า API URL — <a href="config.html" style="color:#d97706">ไปตั้งค่า</a></span>';
  } else {
    window.addEventListener('load', initModels);
  }

  function updateDots() {
    [1,2,3].forEach(i => {
      const dot = document.getElementById('dot' + i);
      dot.className = 'dot' + (i <= saveCounter ? ' active' : '');
    });
  }

  async function initModels() {
    try {
      const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      loadKnownFaces();
      startCamera();
    } catch (e) {
      statusDiv.textContent = '❌ โหลด AI Model ล้มเหลว: ' + e.message;
      statusDiv.style.color = '#dc2626';
    }
  }

  async function loadKnownFaces() {
    try {
      const data = await fetch(API_URL + '?action=getKnownFaces&key=' + encodeURIComponent(APP_KEY)).then(r => r.json());
      if (Array.isArray(data)) {
        knownFaces = data.map(u => ({ name: u.label, descriptor: new Float32Array(u.descriptor) }));
      }
    } catch (e) { /* โหลดไม่ได้ก็ยังลงทะเบียนได้ แค่ไม่มีตัวเช็กหน้าซ้ำ */ }
  }

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => {
        video.srcObject = stream;
        statusDiv.innerText = '';
        btnSave.disabled = false;
      })
      .catch(err => {
        statusDiv.textContent = '❌ เปิดกล้องไม่ได้: ' + err.message;
        statusDiv.style.color = '#dc2626';
      });
  }

  const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

  function faceTurn(detection) {
    const jaw = detection.landmarks.getJawOutline();
    const nose = detection.landmarks.getNose();
    const faceWidth = Math.max(1, jaw[16].x - jaw[0].x);
    const faceCenter = (jaw[0].x + jaw[16].x) / 2;
    return (nose[3].x - faceCenter) / faceWidth;
  }

  async function detectGoodFace() {
    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    return detection && detection.detection.score >= 0.7 ? detection : null;
  }

  async function capturePose(test, instruction, timeoutMs = 25000) {
    statusDiv.textContent = instruction;
    const started = Date.now();
    let stableFrames = 0;
    let latest = null;
    while (isCapturing && Date.now() - started < timeoutMs) {
      const detection = await detectGoodFace();
      if (detection && test(faceTurn(detection))) {
        latest = detection;
        stableFrames++;
        if (stableFrames >= 2) return latest;
      } else {
        stableFrames = 0;
      }
      await wait(250);
    }
    throw new Error('ใช้เวลานานเกินไป กรุณาอยู่ในที่สว่างและหันหน้าช้า ๆ แล้วลองใหม่');
  }

  async function startAutoCapture() {
    const name = document.getElementById('username').value.trim();
    if (!name) return alert('กรุณาใส่ชื่อก่อน');
    if (isCapturing) return;
    isCapturing = true;
    btnSave.disabled = true;
    btnSave.innerHTML = '⏳ กำลังสแกน...';
    msgDiv.innerText = '';
    try {
      const captures = [];
      const center = await capturePose(yaw => Math.abs(yaw) < 0.055, '① มองตรงที่กล้อง');
      captures.push(center);
      saveCounter = 1;
      updateDots();

      let closest = { name: '', distance: 1 };
      knownFaces.forEach(u => {
        if (u.name === name) return;
        const distance = faceapi.euclideanDistance(center.descriptor, u.descriptor);
        if (distance < closest.distance) closest = { name: u.name, distance };
      });
      if (closest.name && closest.distance < DUPLICATE_DISTANCE && !confirm(
        '⚠️ ใบหน้านี้คล้ายกับ "' + closest.name + '" ที่ลงทะเบียนไว้แล้วมาก\nยืนยันลงทะเบียนต่อหรือไม่?'
      )) throw new Error('ยกเลิกการลงทะเบียน');

      const firstSide = await capturePose(yaw => Math.abs(yaw) > 0.09, '② ค่อย ๆ หันหน้าไปด้านใดด้านหนึ่ง');
      const firstDirection = Math.sign(faceTurn(firstSide));
      captures.push(firstSide);
      saveCounter = 2;
      updateDots();

      const otherSide = await capturePose(
        yaw => Math.abs(yaw) > 0.09 && Math.sign(yaw) === -firstDirection,
        '③ หมุนหน้ากลับช้า ๆ ผ่านตรงกลาง ไปอีกด้านหนึ่ง'
      );
      captures.push(otherSide);
      saveCounter = 3;
      updateDots();
      statusDiv.textContent = 'กำลังบันทึกข้อมูล...';

      for (const capture of captures) {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'registerUser', key: APP_KEY, name, descriptor: Array.from(capture.descriptor) })
        });
        const data = await res.json();
        if (!(data.status === 'success' || data.success)) throw new Error(data.message || 'เกิดข้อผิดพลาดจากระบบหลังบ้าน');
      }

      statusDiv.textContent = '';
      msgDiv.innerHTML = '<span class="msg-success">🎉 ลงทะเบียนใบหน้าสำเร็จ!</span>';
      btnSave.innerHTML = '✅ ลงทะเบียนเรียบร้อย';
      document.getElementById('username').disabled = true;
      isCapturing = false;
    } catch (e) {
      isCapturing = false;
      saveCounter = 0;
      updateDots();
      statusDiv.textContent = '';
      msgDiv.textContent = '❌ บันทึกล้มเหลว: ' + e.message;
      msgDiv.className = 'msg-error';
      btnSave.disabled = false;
      btnSave.innerHTML = '🎥 เริ่มสแกนใบหน้าใหม่';
    }
  }
</script>
</body>
</html>
