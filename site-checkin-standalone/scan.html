<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เช็กอินหน้างาน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#06151D">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root {
      --bg: #06151D;
      --surface: #0B222E;
      --surface-2: #0E2B36;
      --border: #144A46;
      --border-strong: #1E6B65;
      --accent: #4AF2D7;
      --accent-2: #3DE0C6;
      --text: #D1F7F2;
      --muted: #86ABA6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Prompt', sans-serif;
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(74, 242, 215, 0.10), transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 110%, rgba(30, 107, 101, 0.18), transparent 60%);
      background-attachment: fixed;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 50px;
    }

    .page-wrap {
      width: 100%; max-width: 560px;
      animation: fadeIn 0.5s ease;
      display: flex; flex-direction: column; align-items: center;
    }

    /* Header */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; margin-bottom: 20px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted); text-decoration: none; font-size: 0.9em; font-weight: 600;
      padding: 8px 16px; border-radius: 50px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.3);
      transition: all 0.25s ease;
    }
    .back-btn:hover { color: var(--accent); background: var(--surface-2); border-color: var(--border-strong); }

    h2 {
      font-size: 1.2em; font-weight: 700;
      background: linear-gradient(180deg, #FFFFFF 0%, #D1F7F2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .spacer { width: 80px; }

    /* Status Area */
    .status-area {
      width: 100%; text-align: center; margin-bottom: 16px;
      background: var(--surface);
      padding: 16px;
      border-radius: 20px;
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border);
    }
    #main-status {
      font-size: 0.95em; color: var(--text); font-weight: 600;
      min-height: 22px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #gps-status {
      font-size: 0.85em; color: var(--muted); margin-top: 8px;
      min-height: 18px;
    }

    /* GPS Alert */
    .gps-alert {
      display: none;
      background: rgba(255, 107, 107, 0.08);
      border: 1px solid rgba(255, 107, 107, 0.35);
      color: #ff6b6b;
      border-radius: 16px; padding: 14px;
      width: 100%; margin-bottom: 16px;
      font-size: 0.9em; font-weight: 600;
      text-align: center;
    }

    /* Scanner Container */
    .video-container {
      position: relative;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      background: #000000;
      border: 2px solid var(--border-strong);
      box-shadow: 0 0 30px -5px rgba(74, 242, 215, 0.3), 0 4px 25px -2px rgba(0, 0, 0, 0.5);
      min-height: 280px;
    }

    video {
      width: 100%; height: auto; display: block;
      transform: scaleX(-1);
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    video.active { opacity: 1; }

    /* Scanner frame corners */
    .scanner-frame {
      position: absolute; inset: 0; z-index: 5; pointer-events: none;
    }
    .corner {
      position: absolute;
      width: 30px; height: 30px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.9;
      filter: drop-shadow(0 0 6px rgba(74, 242, 215, 0.7));
    }
    .corner-tl { top: 16px;    left: 16px;   border-width: 4px 0 0 4px; border-radius: 6px 0 0 0; }
    .corner-tr { top: 16px;    right: 16px;  border-width: 4px 4px 0 0; border-radius: 0 6px 0 0; }
    .corner-bl { bottom: 16px; left: 16px;   border-width: 0 0 4px 4px; border-radius: 0 0 0 6px; }
    .corner-br { bottom: 16px; right: 16px;  border-width: 0 4px 4px 0; border-radius: 0 0 6px 0; }

    /* Scan line */
    .scan-line {
      display: none;
      position: absolute; left: 8%; right: 8%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4AF2D7, transparent);
      box-shadow: 0 0 14px rgba(74, 242, 215, 0.9);
      z-index: 6;
      animation: scanMove 2s ease-in-out infinite;
    }
    .scan-line.active { display: block; }

    /* Overlay status badge */
    #overlay-status {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(6, 21, 29, 0.85);
      backdrop-filter: blur(8px);
      color: var(--text);
      padding: 6px 20px; border-radius: 30px;
      z-index: 10; white-space: nowrap; font-size: 0.85em; font-weight: 700;
      box-shadow: 0 0 12px rgba(74, 242, 215, 0.25);
      border: 1px solid var(--border);
    }

    /* Start Button */
    #btnStart {
      display: none;
      background: linear-gradient(135deg, #4AF2D7 0%, #3DE0C6 100%);
      color: #06151D; border: none; border-radius: 50px;
      padding: 16px 44px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'Prompt', sans-serif;
      box-shadow: 0 0 20px rgba(74, 242, 215, 0.35);
      margin: 20px auto 0;
      transition: all 0.3s ease;
      animation: btnPulse 2s ease-in-out infinite;
    }
    #btnStart:hover {
      background: linear-gradient(135deg, #6FF7E2 0%, #4AF2D7 100%);
      transform: translateY(-3px);
      box-shadow: 0 0 30px rgba(74, 242, 215, 0.55);
      animation: none;
    }

    /* ===== Modal ===== */
    .modal-overlay {
      display: none; position: fixed;
      inset: 0;
      background: rgba(6, 21, 29, 0.75);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px 28px;
      border-radius: 24px;
      width: 90%; max-width: 360px;
      text-align: center;
      box-shadow: 0 0 40px -5px rgba(74, 242, 215, 0.25), 0 20px 40px rgba(0, 0, 0, 0.5);
      display: flex; flex-direction: column; align-items: center;
      animation: modalSlideUp 0.35s ease;
    }
    .modal-avatar {
      font-size: 56px;
      background: rgba(74, 242, 215, 0.08);
      border: 3px solid var(--border-strong);
      border-radius: 50%;
      width: 86px; height: 86px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 0 20px rgba(74, 242, 215, 0.25);
    }
    .modal-title { font-size: 0.85em; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .user-name {
      font-size: 24px; font-weight: 700;
      background: linear-gradient(180deg, #FFFFFF 0%, #D1F7F2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 14px;
    }
    .time-badge {
      background: rgba(74, 242, 215, 0.12);
      border: 1px solid rgba(74, 242, 215, 0.35);
      color: var(--accent);
      padding: 8px 22px; border-radius: 30px;
      font-size: 15px; font-weight: 700;
      margin-bottom: 8px;
    }
    .score-text { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    .btn {
      border: none; border-radius: 16px; cursor: pointer; width: 100%;
      margin: 6px 0; font-family: 'Prompt', sans-serif;
      transition: all 0.25s ease;
    }
    .btn-confirm {
      background: linear-gradient(135deg, #4AF2D7 0%, #3DE0C6 100%);
      color: #06151D;
      padding: 16px; font-size: 16px; font-weight: 700;
      box-shadow: 0 0 18px rgba(74, 242, 215, 0.35);
      margin-bottom: 10px;
    }
    .btn-confirm:hover:not(:disabled) {
      background: linear-gradient(135deg, #6FF7E2 0%, #4AF2D7 100%);
      box-shadow: 0 0 28px rgba(74, 242, 215, 0.55);
      transform: translateY(-2px);
    }
    .btn-confirm:disabled { background: var(--surface-2); color: #3D5A57; box-shadow: none; }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--muted);
      padding: 12px; font-size: 14px; font-weight: 600;
    }
    .btn-cancel:hover { background: var(--surface-2); color: #ff6b6b; border-color: rgba(255, 107, 107, 0.5); }

    /* Note Input & Close Btn */
    .close-modal-btn {
      position: absolute; top: 16px; right: 16px;
      background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 16px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease;
    }
    .close-modal-btn:hover { border-color: var(--accent); color: var(--accent); }

    .note-input {
      width: 100%; padding: 12px 16px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 14px; font-family: 'Prompt', sans-serif;
      outline: none; transition: all 0.3s ease;
      margin-bottom: 16px;
    }
    .note-input::placeholder { color: #3D5A57; }
    .note-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74, 242, 215, 0.15);
    }

    /* Animations */
    @keyframes fadeIn      { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes btnPulse    { 0%,100% { box-shadow: 0 0 15px rgba(74, 242, 215, 0.3); } 50% { box-shadow: 0 0 30px rgba(74, 242, 215, 0.6); } }
    @keyframes scanMove    { 0% { top: 12%; } 50% { top: 82%; } 100% { top: 12%; } }
    @keyframes modalSlideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="page-wrap">

  <div class="top-bar">
    <a href="index.html" class="back-btn">← กลับหน้าหลัก</a>
    <h2>📍 เช็กอินหน้างาน</h2>
    <div class="spacer"></div>
  </div>

  <div class="status-area">
    <div id="main-status">⏳ กำลังเตรียมระบบ...</div>
    <div id="gps-status"></div>
  </div>

  <div id="gps-alert-box" class="gps-alert">
    ⚠️ คุณอยู่นอกพื้นที่ที่กำหนด!<br>กรุณาเข้าใกล้จุดเช็คอินแล้วรีเฟรชหน้าจอ
  </div>

  <button id="btnStart" onclick="startCamera()">📷 แตะเพื่อเริ่มสแกน</button>

  <div class="video-container">
    <div class="scanner-frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-line" id="scanLine"></div>
    </div>
    <div id="overlay-status">รอโหลด...</div>
    <video id="video" autoplay muted playsinline></video>
  </div>

</div>

<!-- Confirm Modal -->
<div id="confirmModal" class="modal-overlay">
  <div class="modal-content" style="position: relative;">
    <button class="close-modal-btn" onclick="cancelAttendance()">✕</button>
    <div class="modal-avatar">🙋</div>
    <p class="modal-title">ตรวจพบบุคคล</p>
    <div class="user-name" id="modalName">...</div>
    <div id="modalTime" class="time-badge">00:00</div>
    <div id="modalScore" class="score-text"></div>

    <input type="text" id="noteInput" class="note-input" placeholder="ใส่หมายเหตุที่นี่ (ถ้ามี)...">

    <button class="btn btn-confirm" id="btnConfirm" onclick="confirmAttendance()">✅ ยืนยันเช็กอิน</button>
    <button class="btn btn-cancel" onclick="cancelAttendance()">ไม่ใช่ฉัน (สแกนใหม่)</button>
  </div>
</div>

<script>
  const API_URL        = localStorage.getItem('gasApiUrl') || GAS_API_URL;
  const APP_KEY        = localStorage.getItem('appKey') || '';
  const video          = document.getElementById('video');
  const mainStatus     = document.getElementById('main-status');
  const overlayStatus  = document.getElementById('overlay-status');
  const confirmModal   = document.getElementById('confirmModal');
  const gpsStatus      = document.getElementById('gps-status');
  const gpsAlertBox    = document.getElementById('gps-alert-box');
  const btnStart       = document.getElementById('btnStart');

  // ===== เกณฑ์การจับคู่ใบหน้า =====
  // MATCH_THRESHOLD  : ระยะห่างสูงสุดที่ยอมรับว่า "ใช่คนนี้" (ยิ่งต่ำยิ่งเข้มงวด)
  // MATCH_MARGIN     : ต้องชนะคนอันดับ 2 อย่างน้อยเท่านี้ ถ้าใกล้เคียงกันเกินไปถือว่ากำกวม ไม่ตัดสิน
  // CONFIRM_FRAMES   : ต้องจับได้เป็นคนเดิมติดต่อกันกี่เฟรมจึงยืนยันตัวตน (กันเฟรมเบลอ/มุมเอียงจับผิดคน)
  // MIN_DETECT_SCORE : ความชัดของใบหน้าขั้นต่ำ เฟรมที่มัว/มืดจะถูกข้ามไม่นำมาตัดสิน
  const MATCH_THRESHOLD  = 0.42;
  const MATCH_MARGIN     = 0.05;
  const CONFIRM_FRAMES   = 3;
  const MIN_DETECT_SCORE = 0.6;

  let knownFaces   = [];
  let scanInterval = null;
  let currentMatch = null;
  let currentLat   = null;
  let currentLng   = null;
  let confirmName  = null;
  let confirmCount = 0;

  if (!API_URL) {
    showError('ยังไม่ได้ตั้งค่า API URL — <a href="config.html" style="color:#fbbf24">ไปตั้งค่า</a>');
  } else {
    window.addEventListener('load', init);
  }

  async function init() {
    try {
      mainStatus.innerText = '1/4 ตรวจสอบ GPS...';
      await checkGPS();
    } catch (e) {
      showError(e.message);
    }
  }

  function checkGPS() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('Browser ไม่รองรับ GPS'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        async pos => {
          currentLat = pos.coords.latitude;
          currentLng = pos.coords.longitude;

          try {
            const config = await fetch(API_URL + '?action=getConfig&key=' + encodeURIComponent(APP_KEY)).then(r => r.json());

            if (config.error === 'unauthorized') {
              reject(new Error(config.message || 'App Key ไม่ถูกต้อง'));
              return;
            }

            if (!config.lat || !config.lng || config.radius == 0) {
              gpsStatus.textContent = '📍 GPS: ไม่จำกัดพื้นที่';
              gpsStatus.style.color = '#3DE0C6';
              gpsStatus.style.fontWeight = '600';
              resolve();
              initFaceSystem();
              return;
            }

            const dist = haversineKm(currentLat, currentLng, config.lat, config.lng);

            if (dist <= config.radius) {
              gpsStatus.textContent = '📍 GPS: OK (ห่างเป้าหมาย ' + dist.toFixed(3) + ' km)';
              gpsStatus.style.color = '#3DE0C6';
              gpsStatus.style.fontWeight = '600';
              resolve();
              initFaceSystem();
            } else {
              gpsStatus.textContent = '📍 GPS: ห่างเกินไป (' + dist.toFixed(3) + ' km / กำหนด ' + Number(config.radius || 0).toFixed(3) + ' km)';
              gpsStatus.style.color = '#ff6b6b';
              gpsStatus.style.fontWeight = '600';
              gpsAlertBox.style.display = 'block';
              mainStatus.innerText = '⛔ ไม่อนุญาตให้สแกน';
              overlayStatus.innerText = 'Out of Range';
            }
          } catch (e) {
            reject(new Error('เชื่อมต่อ API ไม่ได้: ' + e.message));
          }
        },
        () => reject(new Error('กรุณาเปิด GPS (Location Service)'))
      );
    });
  }

  async function initFaceSystem() {
    mainStatus.innerText = '2/4 โหลด AI Model...';
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      loadFaceDatabase();
    } catch (e) {
      showError('โหลด AI Model ล้มเหลว: ' + e.message);
    }
  }

  async function loadFaceDatabase() {
    mainStatus.innerText = '3/4 โหลดฐานข้อมูลพนักงาน...';
    try {
      const data = await fetch(API_URL + '?action=getKnownFaces&key=' + encodeURIComponent(APP_KEY)).then(r => r.json());
      if (data && data.error === 'unauthorized') return showError(data.message || 'App Key ไม่ถูกต้อง');
      if (!data || data.length === 0) return showError('ไม่พบข้อมูลพนักงาน กรุณาลงทะเบียนก่อน');

      knownFaces = data.map(u => ({
        name: u.label,
        descriptor: new Float32Array(u.descriptor)
      }));

      mainStatus.innerText    = '✅ ระบบพร้อมใช้งาน';
      mainStatus.style.color  = '#3DE0C6';
      btnStart.style.display  = 'inline-block';
    } catch (e) {
      showError('โหลดฐานข้อมูลล้มเหลว: ' + e.message);
    }
  }

  function startCamera() {
    btnStart.style.display = 'none';
    mainStatus.innerText   = 'กำลังเปิดกล้อง...';
    mainStatus.style.color = '#86ABA6';

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => {
        video.srcObject = stream;
        video.classList.add('active');
        mainStatus.innerText   = '✅ กำลังสแกน...';
        mainStatus.style.color = '#3DE0C6';
        document.getElementById('scanLine').classList.add('active');
        startScanLoop();
      })
      .catch(err => {
        showError('เปิดกล้องไม่ได้: ' + err.message);
        btnStart.style.display = 'inline-block';
      });
  }

  function startScanLoop() {
    if (scanInterval) clearInterval(scanInterval);
    confirmName  = null;
    confirmCount = 0;
    overlayStatus.innerText      = 'มองกล้องเพื่อสแกน';
    overlayStatus.style.background = 'rgba(6,21,29,0.85)';
    overlayStatus.style.color = '#D1F7F2';
    overlayStatus.style.border = '1px solid #144A46';

    scanInterval = setInterval(async () => {
      if (video.paused || video.ended) return;

      const detection = await faceapi
        .detectSingleFace(video)
        .withFaceLandmarks()
        .withFaceDescriptor();

      // ไม่เจอหน้า หรือเฟรมไม่ชัดพอ → ไม่นำมาตัดสิน และเริ่มนับใหม่
      if (!detection || detection.detection.score < MIN_DETECT_SCORE) {
        confirmName  = null;
        confirmCount = 0;
        return;
      }

      const { best, runnerUp } = findBestMatch(detection.descriptor);
      const passThreshold = best.distance < MATCH_THRESHOLD;
      const passMargin    = !runnerUp || (runnerUp.distance - best.distance) >= MATCH_MARGIN;

      if (passThreshold && passMargin) {
        // ต้องเป็นคนเดิมติดต่อกันครบ CONFIRM_FRAMES เฟรม จึงยืนยัน
        if (best.name === confirmName) {
          confirmCount++;
        } else {
          confirmName  = best.name;
          confirmCount = 1;
        }

        if (confirmCount >= CONFIRM_FRAMES) {
          clearInterval(scanInterval);
          document.getElementById('scanLine').classList.remove('active');
          showModal(best);
        } else {
          overlayStatus.innerText        = '🔎 กำลังยืนยันตัวตน ' + confirmCount + '/' + CONFIRM_FRAMES;
          overlayStatus.style.background = 'rgba(74,242,215,0.12)';
          overlayStatus.style.color      = '#4AF2D7';
          overlayStatus.style.border     = '1px solid rgba(74,242,215,0.5)';
        }
      } else {
        confirmName  = null;
        confirmCount = 0;
        if (passThreshold && !passMargin) {
          // ใกล้เคียงกัน 2 คนเกินไป — ไม่เดา ให้ขยับหน้าเข้าใกล้กล้อง
          overlayStatus.innerText        = 'ใบหน้ากำกวม กรุณาเข้าใกล้กล้องขึ้น';
          overlayStatus.style.background = 'rgba(251,191,36,0.12)';
          overlayStatus.style.color      = '#fbbf24';
          overlayStatus.style.border     = '1px solid rgba(251,191,36,0.5)';
        } else {
          overlayStatus.innerText        = 'ไม่รู้จัก (' + best.distance.toFixed(2) + ')';
          overlayStatus.style.background = 'rgba(255,107,107,0.12)';
          overlayStatus.style.color      = '#ff6b6b';
          overlayStatus.style.border     = '1px solid rgba(255,107,107,0.5)';
        }
      }
    }, 500);
  }

  // จับคู่แบบ "ระยะที่ดีที่สุดต่อคน" แล้วคืนทั้งอันดับ 1 และอันดับ 2 (คนละคนกัน)
  // เพื่อเช็กว่าอันดับ 1 ชนะขาดจริง ไม่ใช่เฉือนกันจนเสี่ยงจับผิดคน
  function findBestMatch(queryDesc) {
    const byName = {};
    knownFaces.forEach(u => {
      const d = faceapi.euclideanDistance(queryDesc, u.descriptor);
      if (byName[u.name] === undefined || d < byName[u.name]) byName[u.name] = d;
    });
    const ranked = Object.keys(byName)
      .map(n => ({ name: n, distance: byName[n] }))
      .sort((a, b) => a.distance - b.distance);
    return {
      best:     ranked[0] || { name: 'unknown', distance: 1.0 },
      runnerUp: ranked[1] || null
    };
  }

  function showModal(match) {
    currentMatch = match.name;
    document.getElementById('modalName').innerText  = match.name;
    document.getElementById('noteInput').value = '';

    const now = new Date();
    const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('modalTime').innerText  = 'เวลาที่สแกน: ' + timeStr + ' น.';

    const pct = ((1 - match.distance) * 100).toFixed(1);
    document.getElementById('modalScore').innerText = 'ความเหมือน: ' + pct + '%';

    confirmModal.style.display = 'flex';
    mainStatus.innerText = 'กรุณายืนยัน...';
    mainStatus.style.color = '#D1F7F2';
  }

  async function confirmAttendance() {
    const btn = document.getElementById('btnConfirm');
    const note = document.getElementById('noteInput').value.trim();
    btn.disabled   = true;
    btn.innerText  = 'กำลังบันทึก...';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
            action: 'logAttendance',
            key: APP_KEY,
            name: currentMatch,
            lat: currentLat,
            lng: currentLng,
            note: note,
            sheetTarget: "Engineer"
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.message || data.error);
      alert('✅ ' + (data.message || 'เช็กอินสำเร็จ'));
      window.location.href = 'index.html';
    } catch (e) {
      alert('❌ บันทึกล้มเหลว: ' + e.message);
      btn.disabled  = false;
      btn.innerText = '✅ ยืนยันเช็กอิน';
    }
  }

  function cancelAttendance() {
    confirmModal.style.display = 'none';
    currentMatch = null;
    confirmName  = null;
    confirmCount = 0;
    if (scanInterval) clearInterval(scanInterval);

    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
    video.classList.remove('active');
    document.getElementById('scanLine').classList.remove('active');

    mainStatus.innerText    = '✅ ระบบพร้อมใช้งาน';
    mainStatus.style.color  = '#3DE0C6';
    overlayStatus.innerText = 'รอโหลด...';
    overlayStatus.style.background = 'rgba(6,21,29,0.85)';
    overlayStatus.style.color = '#D1F7F2';
    overlayStatus.style.border = '1px solid #144A46';
    btnStart.style.display  = 'inline-block';
  }

  function showError(msg) {
    mainStatus.innerHTML = '❌ ' + msg;
    mainStatus.style.color = '#ff6b6b';
    mainStatus.style.fontWeight = 'bold';
  }

  function haversineKm(lat1, lon1, lat2, lon2) {
    const R    = 6371;
    const dLat = deg2rad(lat2 - lat1);
    const dLon = deg2rad(lon2 - lon1);
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function deg2rad(deg) { return deg * Math.PI / 180; }
</script>
